<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3.10 Triangle Inequality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-pink-400 to-rose-500 bg-clip-text text-transparent italic">Triangle Inequality</h1>
            <p class="text-[10px] text-white/50 italic">Property: <b>||u + v|| ≤ ||u|| + ||v||</b>. The shortest distance between two points is a straight line.</p>
            <div id="stats" class="p-3 bg-rose-500/10 rounded font-mono text-[10px] border border-rose-500/20 text-rose-300 space-y-1">
                <div>||u|| + ||v|| = 6.00</div>
                <div>||u + v|| = 5.20</div>
                <div class="pt-1 border-t border-white/5 font-bold text-center">VALID: 5.20 ≤ 6.00</div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-white/40">Adjust Angle between u, v</label>
                <input type="range" id="angle" min="0" max="3.14" step="0.1" value="1" class="w-full accent-rose-500">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10, 0x222222, 0x111111));
        const u = new THREE.Vector3(3, 0, 0); const v = new THREE.Vector3(3, 0, 0);
        const arrowU = new THREE.ArrowHelper(u.clone().normalize(), new THREE.Vector3(0,0,0), 3, 0xffffff, 0.4, 0.2);
        const arrowV = new THREE.ArrowHelper(v.clone().normalize(), new THREE.Vector3(3,0,0), 3, 0xf43f5e, 0.4, 0.2);
        const arrowSum = new THREE.ArrowHelper(v.clone().normalize(), new THREE.Vector3(0,0,0), 1, 0xf59e0b, 0.4, 0.2);
        scene.add(arrowU, arrowV, arrowSum);

        const angleIn = document.getElementById('angle');
        const stats = document.getElementById('stats');

        function update() {
            const ang = parseFloat(angleIn.value);
            const vNew = new THREE.Vector3(Math.cos(ang)*3, Math.sin(ang)*3, 0);
            arrowV.position.copy(u);
            arrowV.setDirection(vNew.clone().normalize());
            
            const sum = u.clone().add(vNew);
            arrowSum.setDirection(sum.clone().normalize());
            arrowSum.setLength(sum.length());

            const sumLen = sum.length();
            const indivSum = 3 + 3;
            stats.innerHTML = `<div>||u|| + ||v|| = ${indivSum.toFixed(2)}</div>
                              <div>||u + v|| = ${sumLen.toFixed(2)}</div>
                              <div class="pt-1 border-t border-white/5 font-bold text-center">VALID: ${sumLen.toFixed(2)} ≤ ${indivSum.toFixed(2)}</div>`;
        }

        angleIn.addEventListener('input', update);
        update();
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
