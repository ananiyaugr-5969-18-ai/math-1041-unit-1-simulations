<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalar Product - Math 1041</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { width: 100%; height: 100%; position: relative; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(20, 20, 20, 0.8); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 300px; }
        .slider-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 3px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .value { float: right; color: #00f2ff; font-weight: bold; }
        .prompt { background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85rem; border-left: 4px solid #ffaa00; margin-bottom: 12px; }
        #result { background: rgba(0, 242, 255, 0.1); padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px dashed #00f2ff; }
        .formula { font-family: serif; font-style: italic; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="container">
        <div id="ui">
            <h1 class="text-xl font-bold mb-4">1.3 Scalar Product & Norm</h1>
            <div class="prompt">
                <strong>Prediction Prompt:</strong><br>
                At what angle $\theta$ does the dot product $A \cdot B$ become zero? Verify it with the slider.
            </div>
            <div class="slider-group">
                <label>Angle $\theta$ (degrees): <span id="valTheta" class="value">45</span></label>
                <input type="range" id="theta" min="0" max="180" step="1" value="45">
            </div>
            <div class="slider-group">
                <label>Magnitude of B: <span id="valB" class="value">4.0</span></label>
                <input type="range" id="magB" min="1" max="6" step="0.1" value="4">
            </div>
            <div id="result">
                <div class="formula">A &middot; B = ||A|| ||B|| cos(&theta;)</div>
                <div class="mt-2 text-sm">
                    ||A|| = 4.0 (fixed)<br>
                    ||B|| = <span id="dispB">4.0</span><br>
                    cos(&theta;) = <span id="dispCos">0.71</span><br>
                    <strong class="text-orange-400">Result = <span id="dispRes">11.3</span></strong>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let arrowA, arrowB, projectionLine;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.GridHelper(10, 10, 0x333333, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            update();

            document.getElementById('theta').addEventListener('input', update);
            document.getElementById('magB').addEventListener('input', update);
            window.addEventListener('resize', onWindowResize, false);
        }

        function update() {
            const thetaDeg = parseFloat(document.getElementById('theta').value);
            const thetaRad = (thetaDeg * Math.PI) / 180;
            const magB = parseFloat(document.getElementById('magB').value);
            const magA = 4.0;

            document.getElementById('valTheta').innerText = thetaDeg;
            document.getElementById('valB').innerText = magB.toFixed(1);
            document.getElementById('dispB').innerText = magB.toFixed(1);
            
            const cosVal = Math.cos(thetaRad);
            const dotProduct = magA * magB * cosVal;

            document.getElementById('dispCos').innerText = cosVal.toFixed(2);
            document.getElementById('dispRes').innerText = dotProduct.toFixed(2);

            if (arrowA) scene.remove(arrowA);
            if (arrowB) scene.remove(arrowB);
            if (projectionLine) scene.remove(projectionLine);

            const vA = new THREE.Vector3(magA, 0, 0);
            const vB = new THREE.Vector3(magB * Math.cos(thetaRad), 0, magB * Math.sin(thetaRad));

            arrowA = new THREE.ArrowHelper(vA.clone().normalize(), new THREE.Vector3(0,0,0), magA, 0x00f2ff, 0.2, 0.1);
            arrowB = new THREE.ArrowHelper(vB.clone().normalize(), new THREE.Vector3(0,0,0), magB, 0xffaa00, 0.2, 0.1);

            // Projection visual
            const projPt = new THREE.Vector3(magB * Math.cos(thetaRad), 0, 0);
            const geom = new THREE.BufferGeometry().setFromPoints([vB, projPt]);
            projectionLine = new THREE.Line(geom, new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.1, gapSize: 0.1 }));
            projectionLine.computeLineDistances();

            scene.add(arrowA, arrowB, projectionLine);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
