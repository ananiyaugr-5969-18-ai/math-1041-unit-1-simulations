<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3.7 Angle Measurement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-purple-400 to-indigo-500 bg-clip-text text-transparent italic">Angle via Dot</h1>
            <p class="text-[10px] text-white/50 italic">The cosine of the angle θ between <b>u</b> and <b>v</b> is <b>(u·v) / (||u||·||v||)</b>.</p>
            <div id="angle-info" class="p-3 bg-indigo-500/10 rounded font-mono text-sm border border-indigo-500/20 text-indigo-300 text-center font-bold tracking-widest transition-all">
                θ = 45.0°
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-white/40">Adjust Vector B</label>
                <input type="range" id="angle" min="0" max="3.14" step="0.05" value="0.78" class="w-full accent-indigo-500">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10, 0x222222, 0x111111));
        const u = new THREE.Vector3(4, 0, 0);
        const arrowU = new THREE.ArrowHelper(u.clone().normalize(), new THREE.Vector3(0,0,0), u.length(), 0xffffff, 0.4, 0.2);
        const arrowV = new THREE.ArrowHelper(new THREE.Vector3(1,1,0), new THREE.Vector3(0,0,0), 4, 0x818cf8, 0.4, 0.2);
        scene.add(arrowU, arrowV);

        const angleIn = document.getElementById('angle');
        const display = document.getElementById('angle-info');

        function update() {
            const ang = parseFloat(angleIn.value);
            arrowV.setDirection(new THREE.Vector3(Math.cos(ang), Math.sin(ang), 0));
            display.textContent = `θ = ${(ang * 180 / Math.PI).toFixed(1)}°`;
        }

        angleIn.addEventListener('input', update);
        update();
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
