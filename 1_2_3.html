<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.2.3 Parallel Vectors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 263.4 70% 50.4%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-pink-400 to-rose-500 bg-clip-text text-transparent italic">Scalar Multiples</h1>
            <p class="text-xs text-white/70">Vector <b>u</b> is parallel to <b>v</b> if <b>u = kv</b> for some scalar <b>k</b>.</p>
            <div class="space-y-4 mt-2">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-white/40">Scalar k (Scale Factor)</label>
                    <input type="range" id="k-slider" min="-3" max="3" step="0.1" value="1.5" class="w-full accent-rose-500">
                </div>
            </div>
            <div id="status" class="p-2 bg-rose-500/10 rounded font-mono text-[11px] border border-rose-500/20 text-rose-400 text-center font-bold uppercase tracking-widest">
                Paralell: Same Direction
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x222222, 0x111111));
        const vBase = new THREE.Vector3(2, 1, 0);
        
        const arrowBase = new THREE.ArrowHelper(vBase.clone().normalize(), new THREE.Vector3(0,0,0), vBase.length(), 0xffffff, 0.5, 0.2);
        const arrowScaled = new THREE.ArrowHelper(vBase.clone().normalize(), new THREE.Vector3(0,0,1), vBase.length(), 0xf43f5e, 0.5, 0.2);
        scene.add(arrowBase, arrowScaled);

        const kSlider = document.getElementById('k-slider');
        const status = document.getElementById('status');

        function update() {
            const k = parseFloat(kSlider.value);
            const vScaled = vBase.clone().multiplyScalar(k);
            
            if (vScaled.length() > 0) {
                arrowScaled.setDirection(vScaled.clone().normalize());
                arrowScaled.setLength(Math.abs(vScaled.length()));
            } else {
                arrowScaled.setLength(0.001);
            }

            if (k > 0) status.textContent = "Parallel: Same Direction";
            else if (k < 0) status.textContent = "Parallel: Opposite Direction";
            else status.textContent = "Zero Vector (k=0)";
        }

        kSlider.addEventListener('input', update);
        update();
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
