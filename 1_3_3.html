<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3.3 Orthogonal Vectors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 142.1 70.6% 45.3%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-green-500 bg-clip-text text-transparent">Orthogonality</h1>
            <p class="text-xs text-white/70">Two vectors are <b>orthogonal</b> (perpendicular) if their dot product is <b>zero</b>.</p>
            <div class="space-y-4 mt-2">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-white/40">Adjust Angle</label>
                    <input type="range" id="angle" min="1.4" max="1.74" step="0.01" value="1.57" class="w-full accent-emerald-500">
                </div>
            </div>
            <div id="status" class="p-2 rounded font-mono text-[11px] border text-center font-bold uppercase tracking-widest transition-colors duration-300">
                Checking...
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10, 0x222222, 0x111111));
        const u = new THREE.Vector3(4, 0, 0);
        const arrowU = new THREE.ArrowHelper(u.clone().normalize(), new THREE.Vector3(0,0,0), u.length(), 0xffffff, 0.4, 0.2);
        const arrowV = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), 4, 0x10b981, 0.4, 0.2);
        scene.add(arrowU, arrowV);

        const boxGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
        const boxMat = new THREE.MeshBasicMaterial({ color: 0x10b981, wireframe: true });
        const box = new THREE.Mesh(boxGeo, boxMat);
        box.position.set(0.15, 0.15, 0);
        scene.add(box);

        const angleIn = document.getElementById('angle');
        const status = document.getElementById('status');

        function update() {
            const angle = parseFloat(angleIn.value);
            const v = new THREE.Vector3(Math.cos(angle) * 4, Math.sin(angle) * 4, 0);
            arrowV.setDirection(v.clone().normalize());
            
            const dot = u.dot(v);
            const isOrthogonal = Math.abs(dot) < 0.05;
            
            box.visible = isOrthogonal;
            if (isOrthogonal) {
                status.textContent = "Orthogonal (u·v = 0)";
                status.className = "p-2 rounded font-mono text-[11px] border text-center font-bold uppercase tracking-widest bg-emerald-500/20 border-emerald-500/40 text-emerald-400";
            } else {
                status.textContent = `Dot Product = ${dot.toFixed(2)}`;
                status.className = "p-2 rounded font-mono text-[11px] border text-center font-bold uppercase tracking-widest bg-white/5 border-white/10 text-white/40";
            }
        }

        angleIn.addEventListener('input', update);
        update();
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
