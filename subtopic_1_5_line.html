<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1.5: 3D Line Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin:0; font-family: sans-serif; overflow:hidden; }
        .card { padding:16px; margin:16px; border:1px solid #eee; border-radius:8px; }
        #canvas { width:100%; height:300px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="text-lg font-bold mb-2">1.5 Plane: $L(t) = P + tD$</h2>
        <div id="canvas"></div>
        <div class="flex gap-4 mt-2">
            <div><label class="text-xs">D.x</label><input type="range" id="dx" min="-5" max="5" value="2" step="0.1" class="block"></div>
            <div><label class="text-xs">P.y</label><input type="range" id="py" min="-5" max="5" value="0" step="0.1" class="block"></div>
        </div>
    </div>
    <script>
        const el = document.getElementById('canvas'), scene = new THREE.Scene(); scene.background=new THREE.Color(0xf7f7f5);
        const cam = new THREE.PerspectiveCamera(75, el.clientWidth/el.clientHeight, 0.1, 1000);
        const ren = new THREE.WebGLRenderer(); ren.setSize(el.clientWidth, el.clientHeight); el.appendChild(ren.domElement);
        scene.add(new THREE.GridHelper(10,10));
        let line;
        function upd() {
            if(line) scene.remove(line);
            const dx = parseFloat(document.getElementById('dx').value), py = parseFloat(document.getElementById('py').value);
            const pts = [new THREE.Vector3(-5*dx,py,0), new THREE.Vector3(5*dx,py,0)];
            line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color:0x529e72}));
            scene.add(line);
        }
        cam.position.set(5,5,5); cam.lookAt(0,0,0);
        function anim() { requestAnimationFrame(anim); ren.render(scene,cam); }
        document.getElementById('dx').oninput = upd; document.getElementById('py').oninput = upd;
        upd(); anim();
    </script>
</body>
</html>
