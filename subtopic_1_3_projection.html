<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3: Dot Product Projection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #ffffff; color: #37352f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overflow: hidden; }
        .canvas-container { width: 100%; height: 300px; position: relative; border-radius: 8px; border: 1px solid #e9e9e7; background: #f7f7f5; cursor: crosshair; }
        .notion-card { padding: 16px; margin: 16px; border: 1px solid #e9e9e7; border-radius: 8px; background: white; box-shadow: rgba(15, 15, 15, 0.02) 0px 0px 0px 1px, rgba(15, 15, 15, 0.03) 0px 2px 4px; }
        .prediction-prompt { background: #f1f1ef; padding: 12px; border-radius: 6px; margin-bottom: 12px; border-left: 4px solid #d44028; font-size: 14px; }
    </style>
</head>
<body>
    <div class="notion-card">
        <h2 class="text-lg font-bold mb-2">1.3 Projection of $\vec{u}$ onto $\vec{v}$</h2>
        <div class="prediction-prompt">Prediction: If the angle is 90°, what happens to the blue projection? Drag red arrow tip to test.</div>
        <div class="canvas-container" id="container"><canvas id="canvas"></canvas></div>
        <div class="mt-4 text-sm" id="info">Scalar Projection: 0</div>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');
        let origin = { x: 50, y: 250 }, u = { x: 150, y: -100 }, v = { x: 300, y: 0 };
        function drawArrow(p1, p2, color, width=2, isDashed=false) {
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = width;
            if (isDashed) ctx.setLineDash([5, 5]); else ctx.setLineDash([]);
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            ctx.setLineDash([]); ctx.beginPath(); ctx.fillStyle = color;
            ctx.moveTo(p2.x, p2.y);
            ctx.lineTo(p2.x - 10 * Math.cos(ang - 0.5), p2.y - 10 * Math.sin(ang - 0.5));
            ctx.lineTo(p2.x - 10 * Math.cos(ang + 0.5), p2.y - 10 * Math.sin(ang + 0.5));
            ctx.fill();
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const dot = u.x * v.x + u.y * v.y, vLenSq = v.x*v.x + v.y*v.y;
            const scalar = dot / vLenSq, proj = { x: v.x * scalar, y: v.y * scalar };
            const pU = { x: origin.x + u.x, y: origin.y + u.y }, pProj = { x: origin.x + proj.x, y: origin.y + proj.y };
            drawArrow(origin, { x: origin.x + v.x, y: origin.y + v.y }, '#37352f', 2);
            drawArrow(origin, pProj, '#2383e2', 4, true);
            drawArrow(origin, pU, '#d44028', 2);
            ctx.beginPath(); ctx.setLineDash([2,4]); ctx.moveTo(pU.x, pU.y); ctx.lineTo(pProj.x, pProj.y); ctx.stroke();
            document.getElementById('info').innerText = `Scalar Projection: ${(dot/Math.sqrt(vLenSq)).toFixed(2)}`;
        }
        let dragging = false;
        container.addEventListener('mousedown', () => dragging = true); window.addEventListener('mouseup', () => dragging = false);
        window.addEventListener('mousemove', e => { if(!dragging) return; const r = canvas.getBoundingClientRect(); u.x = e.clientX - r.left - origin.x; u.y = e.clientY - r.top - origin.y; draw(); });
        window.addEventListener('resize', () => { canvas.width = container.clientWidth; canvas.height = container.clientHeight; origin = { x: 50, y: canvas.height - 50 }; draw(); });
        window.dispatchEvent(new Event('resize'));
    </script>
</body>
</html>
