<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1.4: Right-Hand Rule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin:0; font-family: sans-serif; background:#fff; overflow:hidden; }
        .card { padding:16px; margin:16px; border:1px solid #eee; border-radius:8px; }
        #canvas { width:100%; height:300px; background:#f7f7f5; }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="text-lg font-bold mb-2">1.4 Right-Hand Rule</h2>
        <div id="canvas"></div>
        <button onclick="swap()" class="mt-4 bg-purple-600 text-white px-4 py-2 rounded">Swap Order: <span id="lbl">A × B</span></button>
    </div>
    <script>
        const el = document.getElementById('canvas'), scene = new THREE.Scene(); scene.background = new THREE.Color(0xf7f7f5);
        const cam = new THREE.PerspectiveCamera(75, el.clientWidth/el.clientHeight, 0.1, 1000);
        const ren = new THREE.WebGLRenderer({antialias:true}); ren.setSize(el.clientWidth, el.clientHeight); el.appendChild(ren.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const grid = new THREE.GridHelper(10,10); scene.add(grid);
        let order = 0; const o = new THREE.Vector3(0,0,0), a = new THREE.Vector3(3,0,0), b = new THREE.Vector3(0,3,0);
        const arA = new THREE.ArrowHelper(a.clone().normalize(), o, 3, 0xff0000);
        const arB = new THREE.ArrowHelper(b.clone().normalize(), o, 3, 0x0000ff);
        const arR = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), o, 3, 0x9065b0);
        scene.add(arA, arB, arR); cam.position.set(5,5,5); cam.lookAt(o);
        function swap() { order = 1-order; document.getElementById('lbl').innerText = order===0?"A × B":"B × A"; const res = new THREE.Vector3(); if(order===0)res.crossVectors(a,b); else res.crossVectors(b,a); arR.setDirection(res.normalize()); }
        function anim() { requestAnimationFrame(anim); ren.render(scene, cam); } 
        anim();
    </script>
</body>
</html>
