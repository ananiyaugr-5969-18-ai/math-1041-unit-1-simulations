<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1.5: Distance Point to Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; color: #37352f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overflow: hidden; }
        .canvas-container { width: 100%; height: 300px; position: relative; border-radius: 8px; border: 1px solid #e9e9e7; background: #f7f7f5; }
        .notion-card { padding: 16px; margin: 16px; border: 1px solid #e9e9e7; border-radius: 8px; background: white; box-shadow: rgba(15, 15, 15, 0.02) 0px 0px 0px 1px, rgba(15, 15, 15, 0.03) 0px 2px 4px; }
        .readout { font-size: 18px; font-weight: bold; color: #2383e2; }
    </style>
</head>
<body>
    <div class="notion-card">
        <h2 class="text-md font-bold mb-1">1.5 Distance from Point $Q$ to Plane $\pi$</h2>
        <div class="canvas-container" id="container"></div>
        <div class="mt-4 flex justify-between items-center">
            <div>
                <label class="text-xs font-bold text-gray-400">Point Height (z):</label>
                <input type="range" id="qz" min="0" max="8" step="0.1" value="4" class="block w-48">
            </div>
            <div class="text-right">
                <div class="text-xs font-bold text-gray-400">Distance:</div>
                <div id="dist" class="readout">4.00</div>
            </div>
        </div>
    </div>
    <script>
        const el = document.getElementById('container'), scene = new THREE.Scene(); scene.background = new THREE.Color(0xf7f7f5);
        const cam = new THREE.PerspectiveCamera(75, el.clientWidth/el.clientHeight, 0.1, 1000);
        const ren = new THREE.WebGLRenderer({antialias:true}); ren.setSize(el.clientWidth, el.clientHeight); el.appendChild(ren.domElement);
        scene.add(new THREE.GridHelper(10,10)); scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const planeGeo = new THREE.PlaneGeometry(10, 10);
        const planeMat = new THREE.MeshPhongMaterial({color: 0xebeced, side: THREE.DoubleSide, transparent:true, opacity:0.5});
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = Math.PI / 2;
        scene.add(plane);
        const qMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshPhongMaterial({color:0xd44028}));
        scene.add(qMesh);
        let normalLine;
        function update() {
            const z = parseFloat(document.getElementById('qz').value);
            qMesh.position.set(0, z, 0);
            document.getElementById('dist').innerText = z.toFixed(2);
            if(normalLine) scene.remove(normalLine);
            const pts = [new THREE.Vector3(0,0,0), new THREE.Vector3(0,z,0)];
            normalLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color:0x2383e2}));
            scene.add(normalLine);
        }
        cam.position.set(6, 6, 6); cam.lookAt(0,0,0);
        function anim() { requestAnimationFrame(anim); ren.render(scene, cam); }
        document.getElementById('qz').oninput = update;
        update(); anim();
    </script>
</body>
</html>
