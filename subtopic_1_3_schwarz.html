<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3: Cauchy-Schwarz Inequality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #ffffff; color: #37352f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .notion-card { padding: 16px; margin: 16px; border: 1px solid #e9e9e7; border-radius: 8px; background: white; box-shadow: rgba(15, 15, 15, 0.02) 0px 0px 0px 1px, rgba(15, 15, 15, 0.03) 0px 2px 4px; }
        .comparison-bar { height: 20px; border-radius: 4px; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="notion-card">
        <h2 class="text-lg font-bold mb-2">1.3 Cauchy-Schwarz: $|u \cdot v| \le \|u\| \|v\|$</h2>
        <div class="text-xs mb-2">|u · v| (LHS):</div>
        <div id="lhs" class="comparison-bar bg-blue-500 mb-4" style="width: 50%"></div>
        <div class="text-xs mb-2">||u|| ||v|| (RHS / Max):</div>
        <div id="rhs" class="comparison-bar bg-gray-200" style="width: 100%"></div>
        <div class="mt-4"><input type="range" id="ang" min="0" max="180" value="45" class="w-full"></div>
        <div id="status" class="mt-2 text-sm text-gray-500 italic">Angle: 45°</div>
    </div>
    <script>
        const ang = document.getElementById('ang'), lhs = document.getElementById('lhs'), status = document.getElementById('status');
        ang.addEventListener('input', () => {
            const val = Math.abs(Math.cos(ang.value * Math.PI / 180));
            lhs.style.width = (val * 100) + '%';
            status.innerText = `Angle: ${ang.value}° | Ratio: ${val.toFixed(2)}`;
            if (ang.value % 180 === 0) status.innerText += " (Equality reached!)";
        });
    </script>
</body>
</html>
