<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Points in n-Space - Math 1041</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { width: 100%; height: 100%; position: relative; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(20, 20, 20, 0.8); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 280px; }
        .slider-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .value { float: right; color: #00f2ff; font-weight: bold; }
        .prompt { background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85rem; border-left: 4px solid #00f2ff; margin-bottom: 15px; }
        #coords { font-family: monospace; font-size: 1.1rem; text-align: center; margin-top: 10px; color: #00f2ff; }
    </style>
</head>
<body>
    <div id="container">
        <div id="ui">
            <h1 class="text-xl font-bold mb-4">1.1 Points in $\mathbb{R}^3$</h1>
            <div class="prompt">
                <strong>Prediction Prompt:</strong><br>
                If you set $z = 0$, where will the point lie? What happens to the projection lines?
            </div>
            <div class="slider-group">
                <label>Coordinate x: <span id="valX" class="value">2</span></label>
                <input type="range" id="posX" min="-5" max="5" step="0.1" value="2">
            </div>
            <div class="slider-group">
                <label>Coordinate y: <span id="valY" class="value">3</span></label>
                <input type="range" id="posY" min="-5" max="5" step="0.1" value="3">
            </div>
            <div class="slider-group">
                <label>Coordinate z: <span id="valZ" class="value">4</span></label>
                <input type="range" id="posZ" min="-5" max="5" step="0.1" value="4">
            </div>
            <div id="coords">P = (2.0, 3.0, 4.0)</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let pointGeom, pointMat, point;
        let gridXY, gridYZ, gridXZ;
        let lineX, lineY, lineZ;
        let projXY, projYZ, projXZ;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 8, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffffff, 0.8);
            scene.add(ambientLight);

            // Axes
            const axesHelper = new THREE.AxesHelper(6);
            scene.add(axesHelper);

            // Grids
            const gridColor = 0x333333;
            gridXY = new THREE.GridHelper(10, 10, gridColor, gridColor);
            gridXY.rotation.x = Math.PI / 2;
            scene.add(gridXY);

            // Point
            pointGeom = new THREE.SphereGeometry(0.2, 32, 32);
            pointMat = new THREE.MeshPhongMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 0.5 });
            point = new THREE.Mesh(pointGeom, pointMat);
            scene.add(point);

            // Projection Lines
            const lineMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.2, gapSize: 0.1 });
            
            lineX = createLine(lineMat);
            lineY = createLine(lineMat);
            lineZ = createLine(lineMat);
            
            scene.add(lineX);
            scene.add(lineY);
            scene.add(lineZ);

            updatePosition();

            // Listeners
            document.getElementById('posX').addEventListener('input', updatePosition);
            document.getElementById('posY').addEventListener('input', updatePosition);
            document.getElementById('posZ').addEventListener('input', updatePosition);

            window.addEventListener('resize', onWindowResize, false);
        }

        function createLine(material) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(6);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            return new THREE.Line(geometry, material);
        }

        function updateLine(line, p1, p2) {
            const positions = line.geometry.attributes.position.array;
            positions[0] = p1.x; positions[1] = p1.y; positions[2] = p1.z;
            positions[3] = p2.x; positions[4] = p2.y; positions[5] = p2.z;
            line.geometry.attributes.position.needsUpdate = true;
            line.computeLineDistances();
        }

        function updatePosition() {
            const x = parseFloat(document.getElementById('posX').value);
            const y = parseFloat(document.getElementById('posY').value);
            const z = parseFloat(document.getElementById('posZ').value);

            document.getElementById('valX').innerText = x.toFixed(1);
            document.getElementById('valY').innerText = y.toFixed(1);
            document.getElementById('valZ').innerText = z.toFixed(1);
            document.getElementById('coords').innerText = `P = (${x.toFixed(1)}, ${y.toFixed(1)}, ${z.toFixed(1)})`;

            point.position.set(x, z, y); // Three.js uses Y as up, so we swap Y and Z for standard math notation

            // Projections to axes
            updateLine(lineX, {x: x, y: z, z: y}, {x: 0, y: z, z: y});
            updateLine(lineY, {x: x, y: z, z: y}, {x: x, y: z, z: 0});
            updateLine(lineZ, {x: x, y: z, z: y}, {x: x, y: 0, z: y});
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
