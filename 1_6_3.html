<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.6.3 Volume Calculation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent">Volume Application</h1>
            <p class="text-[10px] text-white/50 italic">The volume of a parallelepiped with edges <b>u, v, w</b> is <b>V = |u·(v x w)|</b>.</p>
            <div id="vol-display" class="p-3 bg-emerald-500/10 rounded font-mono text-lg border border-emerald-500/20 text-emerald-400 text-center font-bold">
                V = 16.00
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-white/40">Scale Edge w</label>
                <input type="range" id="w-scale" min="0.5" max="5" step="0.1" value="2" class="w-full accent-emerald-500">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(6, 6, 12);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x222222, 0x111111));
        
        const edges = new THREE.Group();
        scene.add(edges);

        const wScale = document.getElementById('w-scale');
        const display = document.getElementById('vol-display');

        function update() {
            const s = parseFloat(wScale.value);
            const u = new THREE.Vector3(4, 0, 0);
            const v = new THREE.Vector3(0, 4, 0);
            const w = new THREE.Vector3(1, 1, s);
            
            const vol = Math.abs(u.dot(new THREE.Vector3().crossVectors(v, w)));
            display.textContent = `V = ${vol.toFixed(2)}`;
        }

        wScale.addEventListener('input', update);
        update();
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
