<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3.8 Direction Angles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent italic">Direction Cosines</h1>
            <p class="text-[10px] text-white/50 italic">Angles α, β, γ made with the axes. Property: <b>cos²α + cos²β + cos²γ = 1</b>.</p>
            <div id="ang-info" class="p-3 bg-blue-500/10 rounded font-mono text-[10px] border border-blue-500/20 text-blue-300 space-y-1">
                <div>α = 54.7°, β = 54.7°, γ = 54.7°</div>
                <div class="pt-1 border-t border-white/5 opacity-60">Result Sum: 1.000</div>
            </div>
            <p class="text-[9px] text-white/40 uppercase tracking-widest text-center font-bold">Observation ONLY: Normalized Vector</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 8);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10, 0x222222, 0x111111));
        scene.add(new THREE.AxesHelper(5));

        const arrow = new THREE.ArrowHelper(new THREE.Vector3(1, 1, 1).normalize(), new THREE.Vector3(0,0,0), 4, 0x60a5fa, 0.5, 0.2);
        scene.add(arrow);

        const info = document.getElementById('ang-info');

        let t = 0;
        function animate() {
            requestAnimationFrame(animate);
            t += 0.01;
            const dir = new THREE.Vector3(Math.cos(t), Math.sin(t*0.5), Math.sin(t)).normalize();
            arrow.setDirection(dir);
            
            const alpha = Math.acos(dir.x) * 180 / Math.PI;
            const beta = Math.acos(dir.y) * 180 / Math.PI;
            const gamma = Math.acos(dir.z) * 180 / Math.PI;
            
            info.innerHTML = `<div>α = ${alpha.toFixed(1)}°, β = ${beta.toFixed(1)}°, γ = ${gamma.toFixed(1)}°</div>
                              <div class="pt-1 border-t border-white/5 opacity-60">Σ cos² = ${(dir.x*dir.x + dir.y*dir.y + dir.z*dir.z).toFixed(3)}</div>`;
            renderer.render(scene, camera);
        }
        animate();
        scene.add(new THREE.AmbientLight(0xffffff, 1));
    </script>
</body>
</html>
