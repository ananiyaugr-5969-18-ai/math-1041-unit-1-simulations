<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3.6 Distance Formula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent">Distance Formula</h1>
            <p class="text-[10px] text-white/50 italic">The distance between two points P and Q is the magnitude of the vector <b>Q - P</b>.</p>
            <div id="dist-info" class="p-3 bg-red-500/10 rounded font-mono text-sm border border-red-500/20 text-red-400 text-center font-bold">
                d(P, Q) = 5.00
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-white/40">Move Point Q</label>
                <input type="range" id="q-pos" min="-4" max="4" step="0.1" value="2" class="w-full accent-red-500">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10, 0x222222, 0x111111));
        const p1 = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        const p2 = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({ color: 0xef4444 }));
        p1.position.set(-2, 0, 0);
        scene.add(p1, p2);

        const lineMat = new THREE.LineDashedMaterial({ color: 0xef4444, dashSize: 0.2, gapSize: 0.1 });
        const line = new THREE.Line(new THREE.BufferGeometry(), lineMat);
        scene.add(line);

        const qPos = document.getElementById('q-pos');
        const display = document.getElementById('dist-info');

        function update() {
            const val = parseFloat(qPos.value);
            p2.position.set(val, 3, 0);
            
            const dist = p1.position.distanceTo(p2.position);
            display.textContent = `d(P, Q) = ${dist.toFixed(2)}`;

            line.geometry.setFromPoints([p1.position, p2.position]);
            line.computeLineDistances();
        }

        qPos.addEventListener('input', update);
        update();
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
