<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3.8 Distance Formula</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-red-400 to-indigo-500 bg-clip-text text-transparent italic">Distance Formula</h1>
            <p class="text-[10px] text-white/50 italic">The distance between <b>P₁</b> and <b>P₂</b> is the norm of <b>P₂ - P₁</b>.</p>
            <div id="dist-display" class="p-3 bg-red-500/10 rounded font-mono text-sm border border-red-500/20 text-red-300 text-center font-bold">
                d = 5.39
            </div>
            <div class="flex flex-col gap-1 mt-2">
                <label class="text-[10px] uppercase font-bold text-white/40">Move Point P₂</label>
                <input type="range" id="p2x" min="-5" max="5" step="0.1" value="2" class="w-full accent-red-500">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10, 0x222222, 0x111111));
        const p1 = new THREE.Vector3(-2, -1, 0);
        const sphere1 = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0x6366f1 }));
        sphere1.position.copy(p1);
        scene.add(sphere1);

        const sphere2 = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0xf43f5e }));
        scene.add(sphere2);

        const lineGeo = new THREE.BufferGeometry();
        const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
        scene.add(line);

        const p2x = document.getElementById('p2x');
        const display = document.getElementById('dist-display');

        function update() {
            const x = parseFloat(p2x.value);
            const p2 = new THREE.Vector3(x, 4, 0);
            sphere2.position.copy(p2);
            lineGeo.setFromPoints([p1, p2]);
            display.textContent = `d = ${p1.distanceTo(p2).toFixed(2)}`;
        }

        p2x.oninput = update;
        update();

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
