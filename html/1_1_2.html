<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.1.2 Basic operations for points</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --primary: 142.1 70.6% 45.3%; /* Green */
            --radius: 0.5rem;
        }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 340px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-green-400 to-emerald-400 bg-clip-text text-transparent">Point Operations</h1>
            <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center text-xs">
                    <span class="text-blue-400 font-bold">P1 (Blue)</span>
                    <span id="p1-val" class="font-mono">(2, 1, 0)</span>
                </div>
                <input type="range" id="p1-x" min="-4" max="4" step="0.5" value="2" class="w-full accent-blue-500">
                <div class="flex justify-between items-center text-xs">
                    <span class="text-red-400 font-bold">P2 (Red)</span>
                    <span id="p2-val" class="font-mono">(-1, 2, 0)</span>
                </div>
                <input type="range" id="p2-x" min="-4" max="4" step="0.5" value="-1" class="w-full accent-red-500">
            </div>
            <div class="border-t border-white/10 pt-2 flex flex-col gap-2">
                <select id="op-select" class="bg-black/40 border border-white/10 rounded p-1 text-sm outline-none">
                    <option value="add">Addition (P1 + P2)</option>
                    <option value="sub">Subtraction (P1 - P2)</option>
                </select>
                <div id="result-display" class="p-2 bg-emerald-500/10 rounded font-mono text-sm border border-emerald-500/20 text-emerald-400 text-center font-bold">
                    Result = (1, 3, 0)
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.GridHelper(20, 20, 0x222222, 0x111111));
        scene.add(new THREE.AxesHelper(5));

        const createArrow = (color) => {
            const dir = new THREE.Vector3(1, 0, 0);
            const origin = new THREE.Vector3(0, 0, 0);
            return new THREE.ArrowHelper(dir, origin, 1, color, 0.5, 0.2);
        };

        const arrow1 = createArrow(0x60a5fa); // blue-400
        const arrow2 = createArrow(0xf87171); // red-400
        const arrowRes = createArrow(0x34d399); // emerald-400
        scene.add(arrow1, arrow2, arrowRes);

        const p1x = document.getElementById('p1-x');
        const p2x = document.getElementById('p2-x');
        const opSelect = document.getElementById('op-select');
        const resDisplay = document.getElementById('result-display');

        function update() {
            const v1 = new THREE.Vector3(parseFloat(p1x.value), 1, 0);
            const v2 = new THREE.Vector3(parseFloat(p2x.value), 2, 0);
            let vRes = new THREE.Vector3();

            if (opSelect.value === 'add') vRes.addVectors(v1, v2);
            else vRes.subVectors(v1, v2);

            arrow1.setDirection(v1.clone().normalize());
            arrow1.setLength(v1.length());
            arrow2.setDirection(v2.clone().normalize());
            arrow2.setLength(v2.length());
            arrowRes.setDirection(vRes.clone().normalize());
            arrowRes.setLength(vRes.length());

            document.getElementById('p1-val').textContent = `(${v1.x}, ${v1.y}, ${v1.z})`;
            document.getElementById('p2-val').textContent = `(${v2.x}, ${v2.y}, ${v2.z})`;
            resDisplay.textContent = `Result = (${vRes.x.toFixed(1)}, ${vRes.y.toFixed(1)}, ${vRes.z.toFixed(1)})`;
        }

        [p1x, p2x, opSelect].forEach(i => i.addEventListener('input', update));
        update();
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
