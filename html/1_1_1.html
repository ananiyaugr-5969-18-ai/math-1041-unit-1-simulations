<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.1.1 Representation of points in n-space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --card: 240 10% 3.9%;
            --card-foreground: 0 0% 98%;
            --primary: 263.4 70% 50.4%; /* Purple */
            --primary-foreground: 210 40% 98%;
            --radius: 0.5rem;
        }
        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column; gap: 1rem; max-width: 320px;
        }
        #ui-layer > * { pointer-events: auto; }
        .glass {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 1.5rem;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-2">
            <h1 class="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                Point Representation
            </h1>
            <p class="text-xs text-muted-foreground whitespace-pre-wrap">Representing an ordered n-tuple (x, y, z) as a point in space.</p>
            <div id="coord-display" class="mt-2 p-2 bg-black/40 rounded font-mono text-sm border border-white/5">
                P = (0.00, 0.00, 0.00)
            </div>
            <div class="flex flex-col gap-1 mt-2">
                <label class="text-[10px] uppercase font-bold text-white/40">X Coordinate</label>
                <input type="range" id="x-slider" min="-5" max="5" step="0.1" value="2" class="w-full accent-purple-500">
                <label class="text-[10px] uppercase font-bold text-white/40">Y Coordinate</label>
                <input type="range" id="y-slider" min="-5" max="5" step="0.1" value="1.5" class="w-full accent-purple-500">
                <label class="text-[10px] uppercase font-bold text-white/40">Z Coordinate</label>
                <input type="range" id="z-slider" min="-5" max="5" step="0.1" value="3" class="w-full accent-purple-500">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(8, 8, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Grid & Axes
        const gridHelper = new THREE.GridHelper(20, 20, 0x333333, 0x111111);
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(10);
        scene.add(axesHelper);

        // Point (Sphere)
        const sphereGeo = new THREE.SphereGeometry(0.15, 32, 32);
        const sphereMat = new THREE.MeshPhongMaterial({ 
            color: 0xa855f7, 
            emissive: 0x6b21a8,
            shininess: 100 
        });
        const point = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(point);

        // Lines to axes
        const lineMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.2, gapSize: 0.1, opacity: 0.3, transparent: true });
        const xLine = new THREE.Line(new THREE.BufferGeometry(), lineMat);
        const yLine = new THREE.Line(new THREE.BufferGeometry(), lineMat);
        const zLine = new THREE.Line(new THREE.BufferGeometry(), lineMat);
        scene.add(xLine, yLine, zLine);

        // Labels (Simple sprites)
        function createLabel(text, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 64; canvas.height = 32;
            ctx.fillStyle = color;
            ctx.font = '24px Arial';
            ctx.fillText(text, 10, 25);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            return new THREE.Sprite(spriteMaterial);
        }
        
        const lights = [new THREE.PointLight(0xffffff, 100, 100), new THREE.AmbientLight(0xffffff, 0.4)];
        lights[0].position.set(5, 10, 5);
        scene.add(...lights);

        const xInput = document.getElementById('x-slider');
        const yInput = document.getElementById('y-slider');
        const zInput = document.getElementById('z-slider');
        const display = document.getElementById('coord-display');

        function update() {
            const x = parseFloat(xInput.value);
            const y = parseFloat(yInput.value);
            const z = parseFloat(zInput.value);
            
            point.position.set(x, y, z);
            display.textContent = `P = (${x.toFixed(2)}, ${y.toFixed(2)}, ${z.toFixed(2)})`;

            // Update projection lines
            xLine.geometry.setFromPoints([new THREE.Vector3(x,0,z), new THREE.Vector3(x,y,z)]);
            yLine.geometry.setFromPoints([new THREE.Vector3(x,y,0), new THREE.Vector3(x,y,z)]);
            zLine.geometry.setFromPoints([new THREE.Vector3(0,y,z), new THREE.Vector3(x,y,z)]);
            xLine.computeLineDistances(); yLine.computeLineDistances(); zLine.computeLineDistances();
        }

        [xInput, yInput, zInput].forEach(i => i.addEventListener('input', update));
        update();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
