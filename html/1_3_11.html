<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3.11 Geometric interpretation of dot product</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent italic">Orthogonality</h1>
            <p class="text-[10px] text-white/50 italic">Two vectors are orthogonal if their dot product is zero: <b>u · v = 0</b>.</p>
            <div id="status" class="p-3 bg-emerald-500/10 rounded font-mono text-sm border border-emerald-500/20 text-emerald-300 text-center font-bold">
                Orthogonal!
            </div>
            <p class="text-[9px] text-white/30 text-center">Rotate until the product hits 0.00</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        const u = new THREE.Vector3(4, 0, 0);
        const v = new THREE.Vector3(0, 4, 0);
        const arrU = new THREE.ArrowHelper(u.clone().normalize(), new THREE.Vector3(0,0,0), 4, 0x10b981, 0.4, 0.1);
        const arrV = new THREE.ArrowHelper(v.clone().normalize(), new THREE.Vector3(0,0,0), 4, 0x14b8a6, 0.4, 0.1);
        scene.add(arrU, arrV);

        let angle = 1.57;
        const status = document.getElementById('status');

        function animate() {
            requestAnimationFrame(animate);
            angle += 0.01;
            const curV = new THREE.Vector3(4 * Math.cos(angle), 4 * Math.sin(angle), 0);
            arrV.setDirection(curV.clone().normalize());
            
            const dot = Math.abs(u.dot(curV));
            if (dot < 0.1) {
                status.textContent = "Orthogonal!";
                status.className = "p-3 bg-emerald-500/20 rounded font-mono text-sm border border-emerald-400 text-emerald-300 text-center font-bold";
            } else {
                status.textContent = `Dot: ${u.dot(curV).toFixed(2)}`;
                status.className = "p-3 bg-white/5 rounded font-mono text-sm border border-white/10 text-white/40 text-center";
            }
            
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
