<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.6.1 Parallelogram Area</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-pink-400 to-indigo-400 bg-clip-text text-transparent">Geometric Area</h1>
            <p class="text-[10px] text-white/50 italic">The area of the parallelogram formed by <b>u</b> and <b>v</b> equals the magnitude of their cross product: <b>A = ||u x v||</b>.</p>
            <div id="area-info" class="p-3 bg-pink-500/10 rounded font-mono text-xs border border-pink-500/20 text-pink-300 text-center font-bold">
                Area = 12.00
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-white/40">Shear Angle</label>
                <input type="range" id="shear" min="0.2" max="1.57" step="0.05" value="0.78" class="w-full accent-pink-500">
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10, 0x222222, 0x111111));
        
        const shape = new THREE.Shape();
        const mesh = new THREE.Mesh(new THREE.ShapeGeometry(shape), new THREE.MeshBasicMaterial({ color: 0xec4899, side: THREE.DoubleSide, transparent: true, opacity: 0.4 }));
        scene.add(mesh);

        const arrowU = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), 4, 0xffffff, 0.2, 0.1);
        const arrowV = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), 4, 0xec4899, 0.2, 0.1);
        scene.add(arrowU, arrowV);

        const shearIn = document.getElementById('shear');
        const info = document.getElementById('area-info');

        function update() {
            const ang = parseFloat(shearIn.value);
            const v = new THREE.Vector3(Math.cos(ang) * 4, Math.sin(ang) * 4, 0);
            arrowV.setDirection(v.clone().normalize());
            
            const points = [
                new THREE.Vector2(0,0),
                new THREE.Vector2(4,0),
                new THREE.Vector2(4 + v.x, v.y),
                new THREE.Vector2(v.x, v.y)
            ];
            mesh.geometry.dispose();
            mesh.geometry = new THREE.ShapeGeometry(new THREE.Shape(points));
            
            const area = 4 * v.y; // Base * height
            info.textContent = `Area = ${area.toFixed(2)}`;
        }

        shearIn.addEventListener('input', update);
        update();
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
