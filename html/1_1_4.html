<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.1.4 Algebraic Properties</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 45 93% 47%; /* Gold */ --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">Commutativity</h1>
            <p class="text-xs text-white/70">Visualizing <b>P + Q = Q + P</b> using the parallelogram method.</p>
            <div class="flex flex-col gap-2 mt-2">
                <button id="step-btn" class="bg-amber-600 hover:bg-amber-500 text-white rounded py-2 text-sm font-bold">
                    Start Animation
                </button>
            </div>
            <div id="status" class="text-[11px] font-mono text-amber-200/60 text-center">Ready to demonstrate P+Q and Q+P</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10, 0x222222, 0x111111));
        const p = new THREE.Vector3(3, 1, 0); const q = new THREE.Vector3(1, 3, 0);
        
        const createArrow = (v, origin, color, label) => {
            const arrow = new THREE.ArrowHelper(v.clone().normalize(), origin, v.length(), color, 0.4, 0.2);
            scene.add(arrow);
            return arrow;
        };

        const arrowP = createArrow(p, new THREE.Vector3(0,0,0), 0x3b82f6);
        const arrowQ = createArrow(q, new THREE.Vector3(0,0,0), 0xef4444);
        
        const btn = document.getElementById('step-btn');
        const status = document.getElementById('status');
        let step = 0;

        btn.onclick = () => {
            step++;
            if (step === 1) {
                createArrow(q, p, 0xef4444);
                status.textContent = "Showing P then Q (Blue -> Red)";
            } else if (step === 2) {
                createArrow(p, q, 0x3b82f6);
                status.textContent = "Showing Q then P (Red -> Blue)";
            } else if (step === 3) {
                createArrow(p.clone().add(q), new THREE.Vector3(0,0,0), 0xf59e0b);
                status.textContent = "Result is the same: P+Q = Q+P";
                btn.disabled = true;
                btn.classList.add('opacity-50');
            }
        };

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
