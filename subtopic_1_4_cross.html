<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Product - Math 1041</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { width: 100%; height: 100%; position: relative; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(20, 20, 20, 0.8); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 280px; }
        .slider-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .value { float: right; color: #cc00ff; font-weight: bold; }
        .prompt { background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85rem; border-left: 4px solid #cc00ff; margin-bottom: 15px; }
        .vec-a { color: #00f2ff; }
        .vec-b { color: #f2ff00; }
        .vec-c { color: #cc00ff; }
    </style>
</head>
<body>
    <div id="container">
        <div id="ui">
            <h1 class="text-xl font-bold mb-4">1.4 The Cross Product</h1>
            <div class="prompt">
                <strong>Prediction Prompt:</strong><br>
                If $A$ and $B$ are in the $xy$-plane, what is the $x$ and $y$ component of their cross product $C = A \times B$?
            </div>
            <div class="slider-group">
                <label>Vector <span class="vec-a">A<sub>y</sub></span>: <span id="valAy" class="value">3.0</span></label>
                <input type="range" id="ay" min="-5" max="5" step="0.1" value="3">
            </div>
            <div class="slider-group">
                <label>Vector <span class="vec-b">B<sub>x</sub></span>: <span id="valBx" class="value">3.0</span></label>
                <input type="range" id="bx" min="-5" max="5" step="0.1" value="3">
            </div>
            <div class="mt-4 text-sm bg-black/40 p-3 rounded">
                <span class="vec-a">A = (4, Ay, 0)</span><br>
                <span class="vec-b">B = (Bx, 0, 0)</span><br>
                <strong class="vec-c">C = A &times; B = (0, 0, <span id="resZ">-12.0</span>)</strong>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let arrowA, arrowB, arrowC;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 8, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.GridHelper(10, 10, 0x333333, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            update();

            document.getElementById('ay').addEventListener('input', update);
            document.getElementById('bx').addEventListener('input', update);
            window.addEventListener('resize', onWindowResize, false);
        }

        function update() {
            const ay = parseFloat(document.getElementById('ay').value);
            const bx = parseFloat(document.getElementById('bx').value);
            const ax = 4;
            
            document.getElementById('valAy').innerText = ay.toFixed(1);
            document.getElementById('valBx').innerText = bx.toFixed(1);

            const vA = new THREE.Vector3(ax, ay, 0);
            const vB = new THREE.Vector3(bx, 0, 0);
            const vC = new THREE.Vector3().crossVectors(vA, vB);

            document.getElementById('resZ').innerText = vC.z.toFixed(1);

            if (arrowA) scene.remove(arrowA);
            if (arrowB) scene.remove(arrowB);
            if (arrowC) scene.remove(arrowC);

            arrowA = new THREE.ArrowHelper(vA.clone().normalize(), new THREE.Vector3(0,0,0), vA.length(), 0x00f2ff, 0.2, 0.1);
            arrowB = new THREE.ArrowHelper(vB.clone().normalize(), new THREE.Vector3(0,0,0), vB.length(), 0xf2ff00, 0.2, 0.1);
            
            if (vC.length() > 0.01) {
                arrowC = new THREE.ArrowHelper(vC.clone().normalize(), new THREE.Vector3(0,0,0), vC.length(), 0xcc00ff, 0.3, 0.15);
                scene.add(arrowC);
            }

            scene.add(arrowA, arrowB);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
