<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Addition - Math 1041</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { width: 100%; height: 100%; position: relative; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(20, 20, 20, 0.8); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 280px; }
        .slider-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .value { float: right; color: #f2ff00; font-weight: bold; }
        .prompt { background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85rem; border-left: 4px solid #f2ff00; margin-bottom: 15px; }
        #legend { font-size: 0.9rem; margin-top: 10px; line-height: 1.5; }
        .vec-a { color: #00f2ff; }
        .vec-b { color: #ff0077; }
        .vec-res { color: #f2ff00; }
    </style>
</head>
<body>
    <div id="container">
        <div id="ui">
            <h1 class="text-xl font-bold mb-4">1.2 Vector Addition</h1>
            <div class="prompt">
                <strong>Prediction Prompt:</strong><br>
                What happens to the diagonal of the parallelogram as you rotate Vector B to be parallel to Vector A?
            </div>
            <div class="slider-group">
                <label>Vector <span class="vec-a">A<sub>x</sub></span>: <span id="valAx" class="value">2</span></label>
                <input type="range" id="ax" min="-5" max="5" step="0.1" value="2">
            </div>
            <div class="slider-group">
                <label>Vector <span class="vec-b">B<sub>y</sub></span>: <span id="valBy" class="value">4</span></label>
                <input type="range" id="by" min="-5" max="5" step="0.1" value="4">
            </div>
            <div id="legend">
                <span class="vec-a">A = (Ax, 0, 0)</span><br>
                <span class="vec-b">B = (0, By, 3)</span><br>
                <span class="vec-res font-bold">Res = A + B</span>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let arrowA, arrowB, arrowRes, dashB, dashA;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(6, 6, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
            scene.add(grid);
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            updateVectors();

            document.getElementById('ax').addEventListener('input', updateVectors);
            document.getElementById('by').addEventListener('input', updateVectors);
            window.addEventListener('resize', onWindowResize, false);
        }

        function updateVectors() {
            const ax = parseFloat(document.getElementById('ax').value);
            const by = parseFloat(document.getElementById('by').value);
            const bz = 3;

            document.getElementById('valAx').innerText = ax.toFixed(1);
            document.getElementById('valBy').innerText = by.toFixed(1);

            if (arrowA) scene.remove(arrowA);
            if (arrowB) scene.remove(arrowB);
            if (arrowRes) scene.remove(arrowRes);
            if (dashA) scene.remove(dashA);
            if (dashB) scene.remove(dashB);

            const vA = new THREE.Vector3(ax, 0, 0);
            const vB = new THREE.Vector3(0, by, bz);
            const vRes = vA.clone().add(vB);

            arrowA = new THREE.ArrowHelper(vA.clone().normalize(), new THREE.Vector3(0,0,0), vA.length(), 0x00f2ff, 0.2, 0.1);
            arrowB = new THREE.ArrowHelper(vB.clone().normalize(), new THREE.Vector3(0,0,0), vB.length(), 0xff0077, 0.2, 0.1);
            arrowRes = new THREE.ArrowHelper(vRes.clone().normalize(), new THREE.Vector3(0,0,0), vRes.length(), 0xf2ff00, 0.3, 0.15);

            // Dashed lines for parallelogram
            const material = new THREE.LineDashedMaterial({ color: 0x888888, dashSize: 0.2, gapSize: 0.1 });
            
            const geomB = new THREE.BufferGeometry().setFromPoints([vA, vRes]);
            dashB = new THREE.Line(geomB, material);
            dashB.computeLineDistances();

            const geomA = new THREE.BufferGeometry().setFromPoints([vB, vRes]);
            dashA = new THREE.Line(geomA, material);
            dashA.computeLineDistances();

            scene.add(arrowA, arrowB, arrowRes, dashB, dashA);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
