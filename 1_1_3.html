<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.1.3 Geometric visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --background: 240 10% 3.9%; --foreground: 0 0% 98%; --primary: 199 89% 48%; --radius: 0.5rem; }
        body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #ui-layer { position: absolute; top: 2rem; left: 2rem; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 1rem; max-width: 320px; }
        #ui-layer > * { pointer-events: auto; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius); padding: 1.5rem; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="canvas-container" class="absolute inset-0 w-full h-full"></div>
    <div id="ui-layer">
        <div class="glass flex flex-col gap-3">
            <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-blue-500 bg-clip-text text-transparent">2D vs 3D Space</h1>
            <p class="text-xs text-muted-foreground">Toggle between flat 2D plane and volumetric 3D space.</p>
            <button id="view-toggle" class="bg-blue-600 hover:bg-blue-500 text-white rounded py-2 text-sm font-bold transition-all shadow-lg shadow-blue-900/40">
                Switch to 2D Top View
            </button>
            <div id="info" class="p-2 bg-white/5 rounded text-[11px] text-white/60 italic border border-white/5">
                Current: 3D Perspective View
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x09090b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
        scene.add(grid);
        scene.add(new THREE.AxesHelper(3));

        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshPhongMaterial({ color: 0x38bdf8 }));
        sphere.position.set(2, 3, 2);
        scene.add(sphere);
        scene.add(new THREE.PointLight(0xffffff, 50).set(5,5,5), new THREE.AmbientLight(0xffffff, 0.5));

        let is3D = true;
        const btn = document.getElementById('view-toggle');
        const info = document.getElementById('info');

        btn.onclick = () => {
            is3D = !is3D;
            if (is3D) {
                camera.position.set(5, 5, 5);
                btn.textContent = "Switch to 2D Top View";
                info.textContent = "Current: 3D Perspective View";
            } else {
                camera.position.set(0, 10, 0);
                camera.lookAt(0, 0, 0);
                btn.textContent = "Switch to 3D Perspective";
                info.textContent = "Current: 2D Top View (XY Plane)";
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
