<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lines and Planes - Math 1041</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d0d0d; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { width: 100%; height: 100%; position: relative; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(20, 20, 20, 0.8); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 280px; }
        .slider-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .value { float: right; color: #00ff88; font-weight: bold; }
        .prompt { background: #1a1a1a; padding: 10px; border-radius: 6px; font-size: 0.85rem; border-left: 4px solid #00ff88; margin-bottom: 15px; }
        #eq { font-style: italic; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="container">
        <div id="ui">
            <h1 class="text-xl font-bold mb-4">1.5 Lines & Planes</h1>
            <div class="prompt">
                <strong>Prediction Prompt:</strong><br>
                If you change the normal vector $N$, what happens to the orientation of the plane surface?
            </div>
            <div class="slider-group">
                <label>Normal <span class="text-green-400">N<sub>x</sub></span>: <span id="valNx" class="value">1.0</span></label>
                <input type="range" id="nx" min="-2" max="2" step="0.1" value="1">
            </div>
            <div class="slider-group">
                <label>Normal <span class="text-green-400">N<sub>y</sub></span>: <span id="valNy" class="value">1.0</span></label>
                <input type="range" id="ny" min="-2" max="2" step="0.1" value="1">
            </div>
            <div id="eq">
                Plane Equation:<br>
                <span id="dispEq" class="text-green-400">1.0x + 1.0y + 1.0z = 0</span>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let plane, arrowN;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.GridHelper(10, 10, 0x333333, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            // Initial Plane
            const geometry = new THREE.PlaneGeometry(6, 6);
            const material = new THREE.MeshPhongMaterial({ color: 0x00ff88, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
            plane = new THREE.Mesh(geometry, material);
            scene.add(plane);

            update();

            document.getElementById('nx').addEventListener('input', update);
            document.getElementById('ny').addEventListener('input', update);
            window.addEventListener('resize', onWindowResize, false);
        }

        function update() {
            const nx = parseFloat(document.getElementById('nx').value);
            const ny = parseFloat(document.getElementById('ny').value);
            const nz = 1.0;

            document.getElementById('valNx').innerText = nx.toFixed(1);
            document.getElementById('valNy').innerText = ny.toFixed(1);
            document.getElementById('dispEq').innerText = `${nx.toFixed(1)}x + ${ny.toFixed(1)}y + ${nz.toFixed(1)}z = 0`;

            const normal = new THREE.Vector3(nx, nz, ny).normalize(); // Swap Y/Z for math up
            
            // Align plane to normal
            const up = new THREE.Vector3(0, 1, 0);
            if (normal.distanceTo(up) < 0.01) {
                plane.rotation.set(-Math.PI/2, 0, 0);
            } else {
                plane.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), normal);
            }

            if (arrowN) scene.remove(arrowN);
            arrowN = new THREE.ArrowHelper(normal, new THREE.Vector3(0,0,0), 3, 0x00ff88, 0.5, 0.2);
            scene.add(arrowN);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
